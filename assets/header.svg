<svg width="100%" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00BFFF"/>
      <stop offset="50%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#00BFFF">
        <animate attributeName="offset" values="1;0.5;1" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#00BFFF"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="0"/>

  <!-- Animated grid lines (subtle) -->
  <g opacity="0.07" stroke="#00BFFF" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>

  <!-- Glowing dots -->
  <circle cx="120" cy="30" r="2" fill="#00BFFF" opacity="0.4">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="170" r="2" fill="#1a73e8" opacity="0.4">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="20" r="1.5" fill="#00BFFF" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Waving line top -->
  <path d="M0,10 Q200,2 400,10 Q600,18 800,10" stroke="url(#lineGrad)" stroke-width="1.5" fill="none" opacity="0.6">
    <animate attributeName="d" values="M0,10 Q200,2 400,10 Q600,18 800,10;M0,10 Q200,18 400,10 Q600,2 800,10;M0,10 Q200,2 400,10 Q600,18 800,10" dur="5s" repeatCount="indefinite"/>
  </path>
  <!-- Waving line bottom -->
  <path d="M0,190 Q200,182 400,190 Q600,198 800,190" stroke="url(#lineGrad)" stroke-width="1.5" fill="none" opacity="0.6">
    <animate attributeName="d" values="M0,190 Q200,182 400,190 Q600,198 800,190;M0,190 Q200,198 400,190 Q600,182 800,190;M0,190 Q200,182 400,190 Q600,198 800,190" dur="5s" repeatCount="indefinite"/>
  </path>

  <!-- Main name text -->
  <text
    x="400" y="95"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="52"
    font-weight="700"
    letter-spacing="6"
    fill="url(#textGrad)"
    filter="url(#glow)"
  >
    <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze"/>
    DIVYAANSHU TONK
  </text>

  <!-- Subtitle text -->
  <text
    x="400" y="135"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="15"
    letter-spacing="4"
    fill="#cccccc"
    opacity="0"
  >
    <animate attributeName="opacity" values="0;0;0.85" dur="2s" fill="freeze"/>
    Full-Stack Developer  |  Backend &amp; AI Systems
  </text>

  <!-- Blinking cursor after subtitle -->
  <rect x="598" y="120" width="2" height="18" fill="#00BFFF" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" dur="1.5s" begin="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Decorative bracket left -->
  <text x="42" y="108" font-family="monospace" font-size="70" fill="#00BFFF" opacity="0.15" font-weight="100">{</text>
  <!-- Decorative bracket right -->
  <text x="738" y="108" font-family="monospace" font-size="70" fill="#00BFFF" opacity="0.15" font-weight="100">}</text>
</svg>
